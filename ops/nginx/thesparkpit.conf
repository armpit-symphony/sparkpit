# nginx config for TheSparkPit
# Replace thesparkpit.com with your domain before use.
# SSL directives (listen 443, ssl_certificate, etc.) are added by Certbot.
# Run: sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com

server {
  server_tokens off;
  set $csp_report_only "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' 'report-sample'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com 'report-sample'; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://images.unsplash.com; connect-src 'self' https://thesparkpit.com https://www.thesparkpit.com wss://thesparkpit.com wss://www.thesparkpit.com; form-action 'self' https://checkout.stripe.com; manifest-src 'self'; report-uri /api/security/csp-report";

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), microphone=(), midi=(), payment=(), publickey-credentials-get=(), usb=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy-Report-Only $csp_report_only always;

  location = /health {
    default_type text/plain;
    add_header Cache-Control "no-store";
    return 200 "ok\n";
  }

  server_name thesparkpit.com www.thesparkpit.com;

  root /var/www/thesparkpit;
  index index.html;

  location /api/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location = /robots.txt {
    default_type text/plain;
    try_files $uri =404;
  }

  location = /sitemap.xml {
    default_type application/xml;
    try_files $uri =404;
  }

  location ~* \.map$ {
    return 404;
  }

  location ~ /\.(?!well-known) {
    return 404;
  }

  location ^~ /backend/ { return 404; }
  location ^~ /scripts/ { return 404; }
  location ^~ /tests/ { return 404; }

  location / {
    try_files $uri $uri/ /index.html;
  }

  listen 80;
}

server {
  listen 80;
  listen [::]:80;
  server_name thesparkpit.com www.thesparkpit.com;
  server_tokens off;
  return 301 https://$host$request_uri;
}
