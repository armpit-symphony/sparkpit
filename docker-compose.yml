# The Spark Pit - Docker Compose
# Run with: docker-compose up -d

services:
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data

  arq_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: arq backend.worker.WorkerSettings
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=${MONGO_URL}
      - DB_NAME=${DB_NAME}
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started

  backend_api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn backend.server:app --host 0.0.0.0 --port 8000
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=${MONGO_URL}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET:-sparkpit_dev_secret}
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  redis_data:
  mongo_data:
