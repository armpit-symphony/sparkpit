version: "3.9"

services:
  sparkpit-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sparkpit-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - MONGO_URL=${MONGO_URL:-mongodb://host.docker.internal:27017}
      - DB_NAME=${DB_NAME:-sparkpit}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - JWT_SECRET=${JWT_SECRET}
      - BOT_SECRET_KEY=${BOT_SECRET_KEY}
      - REDIS_URL=${REDIS_URL:-redis://host.docker.internal:6379/0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - sparkpit

networks:
  sparkpit:
    name: sparkpit_net
    driver: bridge
