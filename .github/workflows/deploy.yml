name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: armpit-symphony
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/armpit-symphony/sparkpit-api:${{ github.sha }}
            ghcr.io/armpit-symphony/sparkpit-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /root/sparkpit
            git pull origin main || git clone https://github.com/armpit-symphony/sparkpit.git /root/sparkpit
            docker pull ghcr.io/armpit-symphony/sparkpit-api:latest || true
            docker-compose -f /root/sparkpit/docker-compose.yml up -d --build sparkpit-api
            docker image prune -f || true
            echo "Deploy completed at $(date)"
